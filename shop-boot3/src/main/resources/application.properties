spring.application.name=shop-boot3

# PostgreSQL datasource (production)
spring.datasource.url=jdbc:postgresql://localhost:5432/shopdb
spring.datasource.username=shop
spring.datasource.password=shop
spring.datasource.driver-class-name=org.postgresql.Driver

# Do not run schema.sql in production (manage schema separately)
spring.sql.init.mode=never

# MyBatis
mybatis.mapper-locations=classpath:mapper/*.xml
mybatis.type-aliases-package=com.example.shop.entity
mybatis.configuration.map-underscore-to-camel-case=true

# Jackson
spring.jackson.default-property-inclusion=non_null
