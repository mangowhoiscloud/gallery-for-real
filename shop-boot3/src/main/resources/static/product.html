<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shop — Product Detail</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
      color: #111;
    }

    /* Nav (same as index) */
    nav {
      background: #fff;
      border-bottom: 1px solid #e0e0e0;
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-brand {
      font-size: 1.2rem;
      font-weight: 700;
      color: #2563eb;
      text-decoration: none;
    }

    .nav-links { display: flex; gap: 0.75rem; align-items: center; }

    .nav-link {
      color: #555;
      text-decoration: none;
      font-size: 0.9rem;
      padding: 0.35rem 0.6rem;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .nav-link:hover { background: #f0f4ff; color: #2563eb; }

    /* Page wrapper */
    .page-wrapper {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      color: #2563eb;
      text-decoration: none;
      font-size: 0.9rem;
      margin-bottom: 1.25rem;
    }

    .back-link:hover { text-decoration: underline; }

    /* Product detail card */
    .product-detail {
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0;
    }

    @media (max-width: 640px) {
      .product-detail { grid-template-columns: 1fr; }
    }

    .product-image-col {
      background: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 320px;
    }

    .product-image-col img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .product-image-placeholder {
      font-size: 5rem;
      color: #9ca3af;
    }

    .product-info-col {
      padding: 2rem;
      display: flex;
      flex-direction: column;
    }

    .product-category-badge {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: #2563eb;
      background: #dbeafe;
      padding: 0.2rem 0.55rem;
      border-radius: 99px;
      margin-bottom: 0.75rem;
      align-self: flex-start;
    }

    .product-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #111;
      margin-bottom: 0.75rem;
      line-height: 1.3;
    }

    .product-price {
      font-size: 1.75rem;
      font-weight: 800;
      color: #111;
      margin-bottom: 0.5rem;
    }

    .product-stock {
      font-size: 0.875rem;
      margin-bottom: 1rem;
    }

    .stock-ok { color: #16a34a; }
    .stock-low { color: #d97706; }
    .stock-out { color: #dc2626; font-weight: 600; }

    .product-description {
      font-size: 0.9rem;
      color: #555;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      flex: 1;
    }

    /* Quantity + Add to cart */
    .quantity-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }

    .qty-label { font-size: 0.875rem; font-weight: 500; color: #444; }

    .qty-control {
      display: flex;
      align-items: center;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      overflow: hidden;
    }

    .qty-btn {
      width: 36px; height: 36px;
      background: #f9fafb;
      border: none;
      font-size: 1.1rem;
      cursor: pointer;
      color: #333;
      transition: background 0.15s;
      display: flex; align-items: center; justify-content: center;
    }

    .qty-btn:hover:not(:disabled) { background: #e5e7eb; }
    .qty-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .qty-input {
      width: 52px;
      text-align: center;
      border: none;
      border-left: 1px solid #d1d5db;
      border-right: 1px solid #d1d5db;
      padding: 0.45rem 0;
      font-size: 0.95rem;
      font-weight: 600;
      color: #111;
      outline: none;
      -moz-appearance: textfield;
    }

    .qty-input::-webkit-inner-spin-button,
    .qty-input::-webkit-outer-spin-button { -webkit-appearance: none; }

    .btn-add-cart {
      width: 100%;
      padding: 0.8rem;
      background: #2563eb;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-add-cart:hover:not(:disabled) { background: #1d4ed8; }

    .btn-add-cart:disabled { background: #93c5fd; cursor: not-allowed; }

    /* Alerts */
    .alert {
      padding: 0.75rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      margin-top: 0.75rem;
      display: none;
    }

    .alert.show { display: block; }

    .alert-error {
      background: #fef2f2;
      border: 1px solid #fca5a5;
      color: #b91c1c;
    }

    .alert-success {
      background: #f0fdf4;
      border: 1px solid #86efac;
      color: #166534;
    }

    /* Loading */
    .status-msg {
      text-align: center;
      padding: 4rem 1rem;
      color: #666;
      font-size: 0.95rem;
    }

    .loading-spinner {
      display: inline-block;
      width: 28px; height: 28px;
      border: 3px solid #e5e7eb;
      border-top-color: #2563eb;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 0.5rem;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav>
  <a href="index.html" class="nav-brand">Shop</a>
  <div class="nav-links">
    <a href="cart.html" class="nav-link">Cart</a>
    <a href="orders.html" class="nav-link">Orders</a>
    <span id="authLink"></span>
  </div>
</nav>

<div class="page-wrapper">
  <a href="index.html" class="back-link">← Back to products</a>

  <div id="content">
    <div class="status-msg"><div class="loading-spinner"></div><br>Loading product…</div>
  </div>
</div>

<script>
  // ---- Auth helpers ----
  function getCredentials() { return sessionStorage.getItem('credentials'); }

  function authHeaders() {
    const creds = getCredentials();
    const headers = {};
    if (creds) headers['Authorization'] = 'Basic ' + creds;
    return headers;
  }

  // ---- Nav auth link ----
  (function initNav() {
    const link = document.getElementById('authLink');
    if (getCredentials()) {
      link.innerHTML = '<a href="login.html" class="nav-link" onclick="logout(event)">Logout</a>';
    } else {
      link.innerHTML = '<a href="login.html" class="nav-link">Login</a>';
    }
  })();

  function logout(e) {
    e.preventDefault();
    sessionStorage.removeItem('credentials');
    window.location.replace('login.html');
  }

  // ---- Load product ----
  function getProductId() {
    const params = new URLSearchParams(window.location.search);
    return params.get('id');
  }

  let currentProduct = null;

  async function loadProduct() {
    const id = getProductId();
    if (!id) {
      showError('No product ID specified.');
      return;
    }

    const res = await fetch(`/api/products/${id}`, { headers: authHeaders() });
    if (!res.ok) {
      if (res.status === 404) {
        showError('Product not found.');
      } else {
        showError('Failed to load product. Please try again.');
      }
      return;
    }

    currentProduct = await res.json();
    renderProduct(currentProduct);
  }

  function renderProduct(p) {
    const isOutOfStock = p.stockQuantity === 0;
    const isInactive = p.status === 'INACTIVE';

    let stockHtml;
    if (isInactive) {
      stockHtml = '<span class="stock-out">Unavailable</span>';
    } else if (isOutOfStock) {
      stockHtml = '<span class="stock-out">Out of stock</span>';
    } else if (p.stockQuantity <= 5) {
      stockHtml = `<span class="stock-low">Only ${p.stockQuantity} left in stock</span>`;
    } else {
      stockHtml = `<span class="stock-ok">In stock (${p.stockQuantity} available)</span>`;
    }

    const imgHtml = p.imageUrl
      ? `<img src="${escHtml(p.imageUrl)}" alt="${escHtml(p.name)}">`
      : `<div class="product-image-placeholder">🛍️</div>`;

    const canAddToCart = !isInactive && !isOutOfStock;
    const max = p.stockQuantity || 1;

    document.title = `Shop — ${p.name}`;

    document.getElementById('content').innerHTML = `
      <div class="product-detail">
        <div class="product-image-col">${imgHtml}</div>
        <div class="product-info-col">
          ${p.category ? `<span class="product-category-badge">${escHtml(p.category)}</span>` : ''}
          <h1 class="product-name">${escHtml(p.name)}</h1>
          <div class="product-price">₩${Number(p.price).toLocaleString()}</div>
          <div class="product-stock">${stockHtml}</div>
          <p class="product-description">${escHtml(p.description || 'No description available.')}</p>

          ${canAddToCart ? `
          <div class="quantity-row">
            <span class="qty-label">Qty</span>
            <div class="qty-control">
              <button class="qty-btn" id="qtyMinus" onclick="adjustQty(-1)" aria-label="Decrease">−</button>
              <input type="number" class="qty-input" id="qtyInput" value="1" min="1" max="${max}" oninput="clampQty()" aria-label="Quantity">
              <button class="qty-btn" id="qtyPlus" onclick="adjustQty(1)" aria-label="Increase">+</button>
            </div>
          </div>
          <button class="btn-add-cart" id="addCartBtn" onclick="addToCart()">Add to Cart</button>
          ` : `<button class="btn-add-cart" disabled>Unavailable</button>`}

          <div class="alert alert-error" id="cartError"></div>
          <div class="alert alert-success" id="cartSuccess"></div>
        </div>
      </div>`;

    if (canAddToCart) updateQtyButtons();
  }

  function showError(msg) {
    document.getElementById('content').innerHTML =
      `<div class="status-msg" style="color:#b91c1c">${escHtml(msg)}</div>`;
  }

  // ---- Quantity controls ----
  function adjustQty(delta) {
    const input = document.getElementById('qtyInput');
    const max = currentProduct ? currentProduct.stockQuantity : 1;
    let val = parseInt(input.value, 10) || 1;
    val = Math.max(1, Math.min(max, val + delta));
    input.value = val;
    updateQtyButtons();
  }

  function clampQty() {
    const input = document.getElementById('qtyInput');
    const max = currentProduct ? currentProduct.stockQuantity : 1;
    let val = parseInt(input.value, 10);
    if (isNaN(val) || val < 1) val = 1;
    if (val > max) val = max;
    input.value = val;
    updateQtyButtons();
  }

  function updateQtyButtons() {
    const input = document.getElementById('qtyInput');
    const max = currentProduct ? currentProduct.stockQuantity : 1;
    const val = parseInt(input.value, 10) || 1;
    const minus = document.getElementById('qtyMinus');
    const plus = document.getElementById('qtyPlus');
    if (minus) minus.disabled = val <= 1;
    if (plus) plus.disabled = val >= max;
  }

  // ---- Add to cart ----
  async function addToCart() {
    if (!getCredentials()) {
      window.location.replace('login.html');
      return;
    }

    const qty = parseInt(document.getElementById('qtyInput').value, 10) || 1;
    const btn = document.getElementById('addCartBtn');
    btn.disabled = true;
    btn.textContent = 'Adding…';
    hideAlerts();

    try {
      const res = await fetch('/api/cart/items', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          ...authHeaders()
        },
        body: JSON.stringify({ productId: currentProduct.id, quantity: qty })
      });

      if (res.ok || res.status === 201) {
        showAlert('cartSuccess', `Added ${qty} item(s) to your cart!`);
      } else if (res.status === 401) {
        window.location.replace('login.html');
      } else {
        const body = await res.json().catch(() => ({}));
        showAlert('cartError', body.detail || 'Failed to add to cart. Please try again.');
      }
    } catch (_) {
      showAlert('cartError', 'Network error. Please check your connection.');
    } finally {
      btn.disabled = false;
      btn.textContent = 'Add to Cart';
    }
  }

  // ---- Alert helpers ----
  function showAlert(id, msg) {
    const el = document.getElementById(id);
    if (!el) return;
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 4000);
  }

  function hideAlerts() {
    ['cartError', 'cartSuccess'].forEach(id => {
      const el = document.getElementById(id);
      if (el) el.classList.remove('show');
    });
  }

  function escHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ---- Init ----
  loadProduct().catch(() => showError('Failed to load product.'));
</script>
</body>
</html>
