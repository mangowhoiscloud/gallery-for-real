# H2 in-memory database for tests (PostgreSQL compatibility mode)
db.driver=org.h2.Driver
db.url=jdbc:h2:mem:testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
db.username=sa
db.password=

# Connection pool settings (minimal for tests)
db.pool.initialSize=1
db.pool.maxTotal=5

# MyBatis
mybatis.mapperLocations=classpath:mappers/EmployeeMapper.xml
mybatis.typeAliasesPackage=com.example.legacy.model
