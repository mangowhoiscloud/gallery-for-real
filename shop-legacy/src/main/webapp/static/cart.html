<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cart — ShopLegacy</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div id="navbar"></div>

<div class="container mt-3">
  <h2>Shopping Cart</h2>
  <div id="alert-area"></div>

  <div id="cart-content">
    <div class="text-center mt-3"><span class="spinner"></span></div>
  </div>
</div>

<script src="/static/app.js"></script>
<script>
  App.requireAuth();
  App.renderNavbar('navbar');

  var cartData = null;

  /* ---- Boot ---- */
  loadCart();

  /* ---- Load Cart ---- */
  function loadCart() {
    document.getElementById('cart-content').innerHTML =
      '<div class="text-center mt-3"><span class="spinner"></span></div>';

    App.apiCall('/api/cart').then(function (cart) {
      cartData = cart;
      renderCart(cart);
    }).catch(function (err) {
      if (err.status !== 401) {
        document.getElementById('cart-content').innerHTML =
          '<p class="text-muted">Could not load cart. Please try again.</p>';
      }
    });
  }

  /* ---- Render Cart ---- */
  function renderCart(cart) {
    var items = cart.items || [];

    if (!items.length) {
      document.getElementById('cart-content').innerHTML =
        '<div class="card" style="padding:2rem;text-align:center;">' +
        '<p class="text-muted">Your cart is empty.</p>' +
        '<a href="/static/index.html" class="btn btn-primary">Browse Products</a>' +
        '</div>';
      return;
    }

    var hasInactive = items.some(function (item) {
      return item.productStatus !== 'ACTIVE';
    });

    var html = '<div class="card">';

    /* Items table */
    html += '<table class="table" style="width:100%;border-collapse:collapse;">';
    html += '<thead><tr>' +
      '<th style="text-align:left;padding:0.75rem;border-bottom:2px solid #eee;">Product</th>' +
      '<th style="text-align:right;padding:0.75rem;border-bottom:2px solid #eee;">Unit Price</th>' +
      '<th style="text-align:center;padding:0.75rem;border-bottom:2px solid #eee;">Qty</th>' +
      '<th style="text-align:right;padding:0.75rem;border-bottom:2px solid #eee;">Subtotal</th>' +
      '<th style="padding:0.75rem;border-bottom:2px solid #eee;"></th>' +
      '</tr></thead>';
    html += '<tbody id="cart-items">';

    items.forEach(function (item) {
      var inactive = item.productStatus !== 'ACTIVE';
      html += '<tr id="item-row-' + item.id + '"' + (inactive ? ' class="unavailable"' : '') + '>';

      /* Product name + status badge */
      html += '<td style="padding:0.75rem;border-bottom:1px solid #eee;">';
      html += '<a href="/static/product.html?id=' + item.productId + '">' +
        App.escapeHtml(item.productName) + '</a>';
      if (inactive) {
        html += ' ' + App.statusBadge('INACTIVE');
      }
      html += '</td>';

      /* Unit price */
      html += '<td style="text-align:right;padding:0.75rem;border-bottom:1px solid #eee;">' +
        App.formatPrice(item.unitPrice) + '</td>';

      /* Quantity input */
      html += '<td style="text-align:center;padding:0.75rem;border-bottom:1px solid #eee;">';
      if (inactive) {
        html += '<span class="text-muted">' + item.quantity + '</span>';
      } else {
        html += '<div style="display:flex;align-items:center;gap:0.35rem;justify-content:center;">' +
          '<input type="number" id="qty-' + item.id + '" value="' + item.quantity + '" min="1" ' +
          'style="width:60px;text-align:center;padding:0.3rem;border:1px solid #ccc;border-radius:4px;" ' +
          'onchange="updateQty(' + item.id + ')">' +
          '</div>';
      }
      html += '</td>';

      /* Subtotal */
      html += '<td style="text-align:right;padding:0.75rem;border-bottom:1px solid #eee;">' +
        App.formatPrice(item.subtotal) + '</td>';

      /* Remove button */
      html += '<td style="text-align:center;padding:0.75rem;border-bottom:1px solid #eee;">';
      html += '<button class="btn btn-secondary btn-sm" ' +
        'onclick="removeItem(' + item.id + ', this)">Remove</button>';
      html += '</td>';

      html += '</tr>';
    });

    html += '</tbody></table>';

    /* Cart total */
    html += '<div style="display:flex;justify-content:flex-end;align-items:center;' +
      'padding:1rem;border-top:2px solid #eee;gap:1rem;">';
    html += '<strong style="font-size:1.1rem;">Total: ' + App.formatPrice(cart.cartTotal) + '</strong>';
    html += '</div>';

    html += '</div>'; /* card */

    /* Warning for inactive products */
    if (hasInactive) {
      html += '<div class="alert alert-error" style="margin-top:0.75rem;">' +
        'Some items in your cart are no longer available. Remove them before placing an order.' +
        '</div>';
    }

    /* Shipping address + actions */
    html += '<div class="card" style="margin-top:1rem;padding:1.25rem;">';
    html += '<h3 style="margin-bottom:1rem;font-size:1rem;font-weight:700;">Shipping & Order</h3>';

    html += '<div class="form-group">';
    html += '<label for="shipping-address">Shipping Address</label>';
    html += '<input type="text" id="shipping-address" placeholder="Enter shipping address…" ' +
      'style="width:100%;box-sizing:border-box;">';
    html += '<small class="text-muted">Leave blank to use the address on your profile.</small>';
    html += '</div>';

    html += '<div style="display:flex;gap:0.75rem;flex-wrap:wrap;margin-top:1rem;">';
    html += '<button class="btn btn-secondary" onclick="clearCart()">Clear Cart</button>';
    html += '<button class="btn btn-primary" onclick="placeOrder()" id="order-btn"' +
      (hasInactive ? ' disabled title="Remove unavailable items first"' : '') + '>' +
      'Proceed to Order</button>';
    html += '</div>';

    html += '</div>'; /* card */

    document.getElementById('cart-content').innerHTML = html;

    /* Pre-fill shipping address from member profile */
    loadMemberAddress();
  }

  /* ---- Load member address for pre-fill ---- */
  function loadMemberAddress() {
    App.apiCall('/api/members/me').then(function (member) {
      var input = document.getElementById('shipping-address');
      if (input && member.address) {
        input.value = member.address;
      }
    }).catch(function () { /* address pre-fill is best-effort */ });
  }

  /* ---- Update Quantity ---- */
  function updateQty(itemId) {
    var input = document.getElementById('qty-' + itemId);
    if (!input) return;

    var qty = parseInt(input.value, 10);
    if (isNaN(qty) || qty < 1) {
      input.value = 1;
      qty = 1;
    }

    App.clearAlert('alert-area');
    input.disabled = true;

    App.apiCall('/api/cart/items/' + itemId, {
      method: 'PUT',
      body: { quantity: qty }
    }).then(function (cart) {
      cartData = cart;
      /* Re-render to update subtotals and total */
      renderCart(cart);
    }).catch(function (err) {
      input.disabled = false;
      /* Restore previous quantity */
      if (cartData) {
        var item = (cartData.items || []).find(function (i) { return i.id === itemId; });
        if (item) input.value = item.quantity;
      }
      App.showAlert('alert-area', err.message || 'Could not update quantity.', 'error');
    });
  }

  /* ---- Remove Item ---- */
  function removeItem(itemId, btn) {
    App.clearAlert('alert-area');
    btn.disabled = true;
    btn.textContent = 'Removing…';

    App.apiCall('/api/cart/items/' + itemId, { method: 'DELETE' }).then(function (cart) {
      cartData = cart;
      renderCart(cart);
    }).catch(function (err) {
      btn.disabled = false;
      btn.textContent = 'Remove';
      App.showAlert('alert-area', err.message || 'Could not remove item.', 'error');
    });
  }

  /* ---- Clear Cart ---- */
  function clearCart() {
    if (!confirm('Remove all items from your cart?')) return;
    App.clearAlert('alert-area');

    App.apiCall('/api/cart', { method: 'DELETE' }).then(function () {
      loadCart();
    }).catch(function (err) {
      App.showAlert('alert-area', err.message || 'Could not clear cart.', 'error');
    });
  }

  /* ---- Place Order ---- */
  function placeOrder() {
    App.clearAlert('alert-area');

    var addressInput = document.getElementById('shipping-address');
    var shippingAddress = addressInput ? addressInput.value.trim() : '';

    var orderBtn = document.getElementById('order-btn');
    if (orderBtn) { orderBtn.disabled = true; orderBtn.textContent = 'Placing order…'; }

    var body = {};
    if (shippingAddress) {
      body.shippingAddress = shippingAddress;
    }

    App.apiCall('/api/orders', { method: 'POST', body: body }).then(function () {
      window.location.href = '/static/orders.html';
    }).catch(function (err) {
      if (orderBtn) { orderBtn.disabled = false; orderBtn.textContent = 'Proceed to Order'; }
      App.showAlert('alert-area', err.message || 'Could not place order.', 'error');
    });
  }
</script>
</body>
</html>
